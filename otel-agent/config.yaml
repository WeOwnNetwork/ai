# OTel Collector Agent Configuration — SigNoz Cloud destination
#
# Architecture: this agent runs on every droplet in the WeOwn fleet
# (burnedout-xyz, anythingllm-*, wordpress-*, searxng-*, ...) and ships
# host metrics, container metrics, and logs to SigNoz Cloud over OTLP gRPC.
#
# Secrets are injected at container start by `infisical run` from the
# Infisical project "otel". NEVER hard-code OTEL_KEY or OTEL_URL here.
#
# Required env at container start (injected by infisical run):
#   OTEL_URL  — SigNoz Cloud OTLP/HTTP base URL, e.g. https://ingest.us2.signoz.cloud
#               (the collector appends /v1/traces, /v1/metrics, /v1/logs automatically)
#   OTEL_KEY  — SigNoz Cloud ingestion key (sent as `signoz-access-token` header)
#
# Optional env (set by deploy script, not Infisical):
#   HOSTNAME            — host.name resource attribute (defaults to container hostname)
#   DEPLOY_ENVIRONMENT  — deployment.environment resource attribute (defaults to "production")
#   SERVICE_NAMESPACE   — service.namespace resource attribute (defaults to "weown-ai")
#
# Compliance: NIST DE.CM, CIS 8.5, ISO A.8.15

receivers:
  # Host-level metrics (CPU, memory, disk, filesystem, network, load, paging, processes)
  # `root_path: /hostfs` is required because the collector runs in a container
  # with the host root mounted read-only at /hostfs.
  hostmetrics:
    root_path: /hostfs
    collection_interval: 30s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk:
        metrics:
          system.disk.io:
            enabled: true
          system.disk.operations:
            enabled: true
      filesystem:
        exclude_mount_points:
          mount_points:
            - /proc/*
            - /sys/*
            - /dev/*
            - /hostfs/proc/*
            - /hostfs/sys/*
            - /hostfs/dev/*
            - /var/lib/docker/*
            - /hostfs/var/lib/docker/*
          match_type: regexp
        exclude_fs_types:
          fs_types:
            - autofs
            - binfmt_misc
            - bpf
            - cgroup
            - cgroup2
            - configfs
            - debugfs
            - devpts
            - fuse.snapfuse
            - fusectl
            - hugetlbfs
            - mqueue
            - nsfs
            - overlay
            - proc
            - procfs
            - pstore
            - rpc_pipefs
            - securityfs
            - selinuxfs
            - squashfs
            - sysfs
            - tracefs
          match_type: strict
        metrics:
          system.filesystem.utilization:
            enabled: true
      network:
      load:
      paging:
        metrics:
          system.paging.utilization:
            enabled: true
      processes:

  # Per-container metrics via Docker socket (mounted read-only).
  # Requires api_version >= 1.44 on Docker Engine 25+ (see compose image >= 0.114).
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 30s
    timeout: 20s
    api_version: "1.44"
    metrics:
      container.cpu.usage.total:
        enabled: true
      container.memory.usage.total:
        enabled: true
      container.memory.percent:
        enabled: true
      container.blockio.io_service_bytes_recursive:
        enabled: true
      container.network.io.usage.rx_bytes:
        enabled: true
      container.network.io.usage.tx_bytes:
        enabled: true

  # Container stdout/stderr logs (Docker JSON log files)
  filelog/docker:
    include:
      - /var/lib/docker/containers/*/*.log
    include_file_path: true
    start_at: end
    operators:
      - type: json_parser
        timestamp:
          parse_from: attributes.time
          layout: '%Y-%m-%dT%H:%M:%S.%LZ'
      - type: move
        from: attributes.log
        to: body
      - type: move
        from: attributes.stream
        to: attributes["log.iostream"]
    retry_on_failure:
      enabled: true

  # Caddy structured access logs (if Caddy is configured to write to host)
  # Safe if the file does not exist — receiver will simply not produce data.
  filelog/caddy:
    include:
      - /var/log/host/caddy/*.log
    include_file_path: true
    start_at: end
    operators:
      - type: json_parser
        timestamp:
          parse_from: attributes.ts
          layout_type: epoch
          # Caddy JSON logs use unix_seconds_float (e.g. 1646861401.5241024).
          # Valid epoch layouts: s, ms, us, ns, s.ms, s.us, s.ns — NOT "seconds".
          layout: s.ms
    retry_on_failure:
      enabled: true

  # Host syslog + auth.log
  filelog/syslog:
    include:
      - /var/log/host/syslog
      - /var/log/host/auth.log
    include_file_path: true
    start_at: end
    operators:
      - type: regex_parser
        regex: '^(?P<time>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+(?P<service>[^:\[]+)[\[:]?\s*(?P<message>.*)$'
    retry_on_failure:
      enabled: true

processors:
  # Bound memory usage — prevents the agent OOM-ing the host
  memory_limiter:
    check_interval: 5s
    limit_mib: 200
    spike_limit_mib: 50

  # Detect host attributes (host.name, os.type, etc.) so SigNoz Cloud
  # can group all telemetry by host.
  resourcedetection:
    # Omit `docker` — it opens docker.sock with the bundled client and can block
    # pipeline startup on Docker 25+. host.name is set via HOSTNAME env + resource
    # processor; hostmetrics covers Infrastructure → Hosts in SigNoz.
    detectors: [env, system]
    system:
      hostname_sources: [os]
    override: false
    timeout: 5s

  # Stamp every record with deployment.environment + service.namespace
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:DEPLOY_ENVIRONMENT}
        action: insert
      - key: service.namespace
        value: ${env:SERVICE_NAMESPACE}
        action: insert

  # Drop the otel-agent's own container logs to prevent a feedback loop
  # (otherwise every log line the agent emits is re-ingested as a new log).
  filter/skip_self:
    error_mode: ignore
    logs:
      log_record:
        - 'resource.attributes["container.name"] == "otel-agent"'
        - 'attributes["log.file.name"] != nil and IsMatch(attributes["log.file.name"], ".*otel-agent.*")'

  # Batch for efficient export
  batch:
    timeout: 10s
    send_batch_size: 1024
    send_batch_max_size: 2048

exporters:
  # SigNoz Cloud — OTLP/HTTP over TLS, authenticated via signoz-access-token header.
  # The `endpoint` value comes from Infisical (OTEL_URL) and is the base URL
  # (e.g. https://ingest.us2.signoz.cloud). The exporter appends:
  #   /v1/traces   /v1/metrics   /v1/logs
  # We use HTTP rather than gRPC because the Infisical-stored OTEL_URL is a
  # full https://… URL, which the gRPC exporter does not accept.
  otlphttp/signoz:
    endpoint: ${env:OTEL_URL}
    tls:
      insecure: false
    headers:
      signoz-access-token: ${env:OTEL_KEY}
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000

extensions:
  # Loopback-only health check — never expose on the public host interface
  health_check:
    endpoint: 127.0.0.1:13133

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: warn
  pipelines:
    metrics:
      receivers: [hostmetrics, docker_stats]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [otlphttp/signoz]
    logs:
      receivers: [filelog/docker, filelog/caddy, filelog/syslog]
      processors: [memory_limiter, resourcedetection, resource, filter/skip_self, batch]
      exporters: [otlphttp/signoz]
