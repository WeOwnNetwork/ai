name: Auto-Create PR to Main

# Authors PRs as the ecosystem-wide `weown-bot` service account so that
# GitHub Copilot code review is auto-triggered (Copilot only reviews PRs
# authored by human-type accounts, not GitHub Apps).
#
# See:
#   - .github/workflows/README.md  (authoritative ops reference)
#   - .github/ADR-001-service-account-pat.md
#   - .github/ADR-002-infisical-github-sync.md
#   - .github/copilot-instructions.md (phase-aware compliance directives)

on:
  push:
    branches:
      - 'feature/*'
      - 'fix/*'
      - 'docs/*'
      - 'hotfix/*'
      - '!main'
      - '!experimental/*'

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WEOWN_BOT_PAT }}

      - name: Create or Update Pull Request
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.WEOWN_BOT_PAT }}
        run: |
          set -euo pipefail

          # ────────────────────────────────────────────────────────────
          # 1. Branch identification
          # ────────────────────────────────────────────────────────────
          BRANCH_NAME="${{ github.ref_name }}"
          TARGET_BRANCH="main"

          # ────────────────────────────────────────────────────────────
          # 2. If PR already exists, let new commits flow into it
          # ────────────────────────────────────────────────────────────
          existing_pr=$(gh pr list --base "$TARGET_BRANCH" --head "$BRANCH_NAME" --json number --jq '.[0].number')
          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists on $BRANCH_NAME; new commits will be added automatically."
            echo "pr_number=$existing_pr" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ────────────────────────────────────────────────────────────
          # 3. Safe temp files (no /tmp, always cleaned up)
          # ────────────────────────────────────────────────────────────
          PR_BODY="$(mktemp)"
          PR_TITLE="$(mktemp)"
          trap 'rm -f "$PR_BODY" "$PR_TITLE"' EXIT

          # ────────────────────────────────────────────────────────────
          # 4. Commit range helpers
          # ────────────────────────────────────────────────────────────
          COMMIT_RANGE=""
          if git rev-parse --verify "origin/$TARGET_BRANCH" >/dev/null 2>&1; then
            COMMIT_RANGE="$BRANCH_NAME ^origin/$TARGET_BRANCH"
          else
            COMMIT_RANGE="$BRANCH_NAME"
          fi

          # ────────────────────────────────────────────────────────────
          # 5. Title: "Auto-PR: <subject of first commit relative to main>"
          # ────────────────────────────────────────────────────────────
          FIRST_COMMIT_SUBJECT=$(git log --format=%s -1 $COMMIT_RANGE 2>/dev/null || echo "")
          if [ -z "$FIRST_COMMIT_SUBJECT" ]; then
            COMMIT_COUNT=$(git rev-list --count $COMMIT_RANGE 2>/dev/null || echo "0")
            LATEST_SUBJECT=$(git log --format=%s -1 "$BRANCH_NAME" 2>/dev/null || echo "")
            if [ -n "$LATEST_SUBJECT" ]; then
              FIRST_COMMIT_SUBJECT="Merge $BRANCH_NAME into $TARGET_BRANCH - $LATEST_SUBJECT"
            elif [ "$COMMIT_COUNT" != "0" ]; then
              FIRST_COMMIT_SUBJECT="Merge $BRANCH_NAME into $TARGET_BRANCH ($COMMIT_COUNT commits)"
            else
              FIRST_COMMIT_SUBJECT="Merge $BRANCH_NAME into $TARGET_BRANCH"
            fi
          fi
          echo "Auto-PR: $FIRST_COMMIT_SUBJECT" > "$PR_TITLE"

          # ────────────────────────────────────────────────────────────
          # 6. Developer attribution from branch name:
          #    <type>/<dev>-<description>  (e.g., feature/roman-add-thing)
          #    Fallback to git author local-part if parsing fails.
          # ────────────────────────────────────────────────────────────
          TRIGGERED_BY=""
          # Strip the type/ prefix, then take segment before first '-'
          STRIPPED="${BRANCH_NAME#*/}"
          if [ "$STRIPPED" != "$BRANCH_NAME" ] && [[ "$STRIPPED" == *-* ]]; then
            TRIGGERED_BY="${STRIPPED%%-*}"
          fi
          if [ -z "$TRIGGERED_BY" ]; then
            LATEST_AUTHOR_EMAIL=$(git log --format=%ae -1 "$BRANCH_NAME" 2>/dev/null || echo "")
            TRIGGERED_BY="${LATEST_AUTHOR_EMAIL%%@*}"
          fi
          [ -z "$TRIGGERED_BY" ] && TRIGGERED_BY="unknown"

          # ────────────────────────────────────────────────────────────
          # 7. Deduplicated contributors list (name + email)
          # ────────────────────────────────────────────────────────────
          CONTRIBUTORS_FILE="$(mktemp)"
          trap 'rm -f "$PR_BODY" "$PR_TITLE" "$CONTRIBUTORS_FILE"' EXIT
          git log --format='%an <%ae>' $COMMIT_RANGE 2>/dev/null | sort -u > "$CONTRIBUTORS_FILE" || true

          # ────────────────────────────────────────────────────────────
          # 8. Build the PR body
          #
          # Key upgrade vs. prior version: show FULL commit bodies (%b),
          # author identity (%an <%ae>), and date (%ad) so Copilot AI
          # review sees the full rationale, not just subject lines.
          # ────────────────────────────────────────────────────────────
          {
            echo "🤖 Automated Pull Request — authored by \`weown-bot\` (ecosystem service account)"
            echo ""
            echo "**Triggered by:** @${TRIGGERED_BY}"
            echo "**Branch:** \`${BRANCH_NAME}\` → \`${TARGET_BRANCH}\`"
            echo ""
            echo "**Contributors on this branch:**"
            echo ""
            if [ -s "$CONTRIBUTORS_FILE" ]; then
              sed 's/^/- /' "$CONTRIBUTORS_FILE"
            else
              echo "- _(none detected — possibly no commits vs. target)_"
            fi
            echo ""
            echo "---"
            echo ""
            echo "## 📋 Human Review Checklist — NIST CSF 2.0 Functions"
            echo ""
            echo "Review per the 6 NIST CSF Functions. Frameworks referenced: NIST CSF 2.0, CIS Controls v8 IG1, CSA CCM v4, ISO/IEC 27001:2022, SOC 2, ISO/IEC 42001:2023. See [\`docs/COMPLIANCE_ROADMAP.md\`](../docs/COMPLIANCE_ROADMAP.md)."
            echo ""
            echo "### 🏛️ Govern (GV)"
            echo "- [ ] CODEOWNERS correct for affected paths (\`.github/CODEOWNERS\`)"
            echo "- [ ] ADR required/updated if an architectural decision is introduced"
            echo "- [ ] Policy impact considered and documented"
            echo "- [ ] All Copilot AI review comments addressed or explicitly deferred with rationale"
            echo ""
            echo "### 🔍 Identify (ID)"
            echo "- [ ] New assets inventoried (Helm values, container images, dependencies)"
            echo "- [ ] SBOM regenerated if dependencies changed"
            echo "- [ ] Risk register / threat model touched if threat surface changed (\`.github/SECURITY_ASSESSMENT.md\`)"
            echo ""
            echo "### 🛡️ Protect (PR)"
            echo "- [ ] Least privilege: RBAC, ServiceAccounts, scoped PATs (NIST PR.AC, CIS 5/6, ISO A.5.15-A.5.18)"
            echo "- [ ] Secrets managed via Infisical (never \`--from-literal\`, never \`/tmp\`, always \`\$(mktemp)\` — ISO A.8.24)"
            echo "- [ ] NetworkPolicy present for new deployments (NIST PR.AC-5, CIS 12, CSA IVS)"
            echo "- [ ] TLS 1.3 with strong cipher suites where applicable (NIST PR.DS-1, CIS 3)"
            echo "- [ ] Container security: non-root UID 1000+, Pod Security \`restricted\` (NIST PR.IP, CIS 4)"
            echo ""
            echo "### 🕵️ Detect (DE)"
            echo "- [ ] Logs / metrics added for new components (NIST DE.CM, CIS 8/13)"
            echo "- [ ] Alert rules updated if thresholds change"
            echo "- [ ] Health checks (\`livenessProbe\` + \`readinessProbe\`) configured"
            echo ""
            echo "### 🚨 Respond (RS)"
            echo "- [ ] Runbook updated if operational behavior changes (\`.github/INCIDENT_RESPONSE.md\`)"
            echo "- [ ] Incident response impact considered (escalation paths, on-call)"
            echo ""
            echo "### ♻️ Recover (RC)"
            echo "- [ ] Backup strategy covers new persistent data (NIST RC.RP, CIS 11, ISO A.8.13)"
            echo "- [ ] Rollback procedure tested or documented"
            echo "- [ ] DR impact assessed for new critical components"
            echo ""
            echo "### 📚 Documentation & Versioning"
            echo "- [ ] Relevant \`CHANGELOG.md\` updated (per-directory or repo-level \`/CHANGELOG.md\`)"
            echo "- [ ] \`#WeOwnVer\` version bumped per [\`docs/VERSIONING_WEOWNVER.md\`](../docs/VERSIONING_WEOWNVER.md)"
            echo "- [ ] READMEs / ADRs / inline comments updated"
            echo ""
            echo "---"
            echo ""
            echo "## 📝 Recent Commits (full bodies for Copilot context)"
            echo ""
            # Full commit details for Copilot: hash, subject, author, date, body
            git log --format='### %h %s%n%n**Author:** %an <%ae>  %n**Date:** %ad%n%n%b%n---%n' $COMMIT_RANGE 2>/dev/null | head -c 60000 || true
            echo ""
            echo "---"
            echo ""
            echo "**🔍 Copilot AI Review**: Automatically triggered because PR is authored by \`weown-bot\` (human-type service account)."
            echo ""
            echo "**👥 Required Reviewers**: 2 human approvals enforced by branch protection. \`@ncimino\` + \`@romandidomizio\` requested automatically."
            echo "<!-- TODO(2026-05-15): After Roman leaves, replace 'romandidomizio' in the \`--add-reviewer\` line below with the appropriate reviewer per CODEOWNERS (Mohammed / Shahid / Dhruv depending on paths). Keep @ncimino. Two reviewers always required. -->"
            echo ""
            echo "**📚 Review Guidelines**: [\`.github/copilot-instructions.md\`](../.github/copilot-instructions.md) (phase-aware compliance directives)"
            echo ""
            echo "**🛠️ Workflow Operations**: [\`.github/workflows/README.md\`](../.github/workflows/README.md)"
            echo ""
            echo "**Auto-generated by** [\`.github/workflows/auto-pr-to-main.yml\`](../.github/workflows/auto-pr-to-main.yml)"
          } > "$PR_BODY"

          # ────────────────────────────────────────────────────────────
          # 9. Create the PR
          # ────────────────────────────────────────────────────────────
          pr_url=$(gh pr create \
            --base "$TARGET_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "$(cat "$PR_TITLE")" \
            --body-file "$PR_BODY")
          pr_number=$(echo "$pr_url" | grep -oE '[0-9]+$')
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "Created PR #$pr_number: $pr_url"

          # ────────────────────────────────────────────────────────────
          # 10. Auto-assign 2 required human reviewers
          #     Branch protection also ENFORCES the 2-approval minimum;
          #     this line REQUESTS the reviewers so they're notified.
          #
          # TODO(2026-05-15): After Roman leaves, replace 'romandidomizio'
          # with the appropriate reviewer per CODEOWNERS (Mohammed /
          # Shahid / Dhruv depending on affected paths). Keep @ncimino.
          # Two reviewers are always required via branch protection.
          # ────────────────────────────────────────────────────────────
          gh pr edit "$pr_number" --add-reviewer ncimino,romandidomizio || \
            echo "::warning::Failed to auto-assign reviewers on PR #$pr_number; they can be added manually."

          echo "Note: Copilot auto-review will trigger because PR was authored by weown-bot (human-type account)."
