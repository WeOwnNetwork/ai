# Formbricks production stack for forms.weown.tools
# Formbricks v5 baseline: web + Postgres (pgvector) + Redis/Valkey + Hub + Cube + Caddy
# Secrets come from .env (never commit). Generate on the host via scripts/deploy.sh.

x-formbricks-env: &formbricks-env
  WEBAPP_URL: ${WEBAPP_URL}
  NEXTAUTH_URL: ${NEXTAUTH_URL}
  DATABASE_URL: ${DATABASE_URL}
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}
  CRON_SECRET: ${CRON_SECRET:?Set CRON_SECRET in .env}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  HUB_API_KEY: ${HUB_API_KEY:?Set HUB_API_KEY in .env}
  HUB_API_URL: ${HUB_API_URL:-http://hub:8080}
  CUBEJS_API_URL: ${CUBEJS_API_URL:-http://cube:4000}
  CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:?Set CUBEJS_API_SECRET in .env}
  CUBEJS_JWT_ISSUER: ${CUBEJS_JWT_ISSUER:-formbricks-web}
  CUBEJS_JWT_AUDIENCE: ${CUBEJS_JWT_AUDIENCE:-formbricks-cube}
  EMAIL_VERIFICATION_DISABLED: ${EMAIL_VERIFICATION_DISABLED:-1}
  PASSWORD_RESET_DISABLED: ${PASSWORD_RESET_DISABLED:-1}
  TAXONOMY_SERVICE_URL: ""
  TAXONOMY_SERVICE_TOKEN: ""
  HUB_INTERNAL_API_TOKEN: ""

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      formbricks:
        condition: service_started
    networks:
      - formbricks
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-formbricks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-formbricks}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-formbricks} -d $${POSTGRES_DB:-formbricks} || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    networks:
      - formbricks
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    networks:
      - formbricks
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  formbricks-migrate:
    image: ghcr.io/formbricks/formbricks:latest
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      [
        "node /home/nextjs/validate-env.mjs && if command -v timeout >/dev/null 2>&1; then timeout 300 node packages/database/dist/scripts/apply-migrations.js; else node packages/database/dist/scripts/apply-migrations.js; fi",
      ]
    environment:
      <<: *formbricks-env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - formbricks

  hub-migrate:
    image: ghcr.io/formbricks/hub:latest
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      [
        'if [ -x /usr/local/bin/goose ] && [ -x /usr/local/bin/river ]; then /usr/local/bin/goose -dir /app/migrations postgres "$$DATABASE_URL" up && /usr/local/bin/river migrate-up --database-url "$$DATABASE_URL"; else echo "Migration tools (goose/river) not in image."; exit 1; fi',
      ]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      formbricks-migrate:
        condition: service_completed_successfully
    networks:
      - formbricks

  hub:
    image: ghcr.io/formbricks/hub:latest
    restart: unless-stopped
    environment:
      API_KEY: ${HUB_API_KEY}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      hub-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - formbricks
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  cube:
    image: cubejs/cube:v1.6.6
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        if [ -z "$$CUBEJS_API_SECRET" ]; then
          echo "CUBEJS_API_SECRET is required for Cube JWT authentication" >&2
          exit 1
        fi
        exec cubejs server
    environment:
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: postgres
      CUBEJS_DB_NAME: ${POSTGRES_DB:-formbricks}
      CUBEJS_DB_USER: ${POSTGRES_USER:-formbricks}
      CUBEJS_DB_PASS: ${POSTGRES_PASSWORD}
      CUBEJS_DB_PORT: "5432"
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET}
      CUBEJS_JWT_ISSUER: ${CUBEJS_JWT_ISSUER:-formbricks-web}
      CUBEJS_JWT_AUDIENCE: ${CUBEJS_JWT_AUDIENCE:-formbricks-cube}
      CUBEJS_DEFAULT_API_SCOPES: meta,data
      CUBEJS_CACHE_AND_QUEUE_DRIVER: memory
    volumes:
      - ./cube/cube.js:/cube/conf/cube.js:ro
      - ./cube/schema:/cube/conf/model:ro
    depends_on:
      hub-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/readyz', (res) => { res.resume(); process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - formbricks
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  formbricks:
    image: ghcr.io/formbricks/formbricks:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      <<: *formbricks-env
      SKIP_STARTUP_MIGRATION: "true"
      # cgroup mem limit otherwise caps V8 heap at ~half (~384Mi) → OOM on Next.js 16
      NODE_OPTIONS: "--max-old-space-size=1024"
    volumes:
      - uploads_data:/home/nextjs/apps/web/uploads/
      - ./saml-connection:/home/nextjs/apps/web/saml-connection
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cube:
        condition: service_healthy
      hub:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health', (res) => { res.resume(); process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - formbricks
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1400M

networks:
  formbricks:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:
