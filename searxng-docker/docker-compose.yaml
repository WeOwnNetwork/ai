services:
  searxng:
    container_name: searxng
    # Pinned per .github/copilot-instructions.md §3.7 (immutable tags).
    # SearXNG publishes dated tags — see https://hub.docker.com/r/searxng/searxng/tags
    # When bumping, also update the canonical template at
    # searxng-docker/template/copier.yaml's `searxng_image` default.
    image: docker.io/searxng/searxng:2026.5.13-eb12c9b
    restart: always
    networks:
      - searxng-net
    # DigitalOcean Load Balancer terminates TLS and forwards HTTP to port 80.
    ports:
      - "80:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_SETTINGS_PATH=/etc/searxng/settings.yml
      - INSTANCE_NAME=searxng
      - SEARXNG_FORMATS=html,json
    depends_on:
      - redis

  redis:
    container_name: searxng-redis
    image: docker.io/valkey/valkey:7-alpine
    restart: always
    command: valkey-server --save 60 1 --loglevel warning
    networks:
      - searxng-net

networks:
  searxng-net:
    driver: bridge
