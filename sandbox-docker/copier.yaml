# sandbox-docker copier template
# Template for creating AIO Sandbox (agent-infra/sandbox) deployments on DigitalOcean droplets
# All application secrets are sourced from Infisical at runtime — never stored in git or on disk
# Usage: copier copy . ../sandbox-agent --data-file answers.yaml
#
# See: https://copier.readthedocs.io/

_min_copier_version: "9.0.0"
_subdirectory: template

# =============================================================================
# Project Identity
# =============================================================================
project_name:
  type: str
  help: "Project name (lowercase, hyphens allowed - e.g., 'sandbox-agent')"
  validator: "{% if not project_name | regex_search('^[a-z][a-z0-9-]*$') %}Must be lowercase alphanumeric with hyphens{% endif %}"

domain:
  type: str
  help: "Primary domain (e.g., 'sandbox.weown.dev')"
  validator: "{% if not domain | regex_search('^[a-z0-9][a-z0-9.-]+\\.[a-z]{2,}$') %}Must be a valid domain{% endif %}"

# =============================================================================
# DigitalOcean Infrastructure
# =============================================================================
do_region:
  type: str
  help: "DigitalOcean region slug"
  default: "atl1"
  choices:
    - ["Atlanta 1", "atl1"]
    - ["New York 1", "nyc1"]
    - ["New York 3", "nyc3"]
    - ["San Francisco 3", "sfo3"]
    - ["Amsterdam 3", "ams3"]
    - ["Singapore 1", "sgp1"]
    - ["London 1", "lon1"]
    - ["Frankfurt 1", "fra1"]
    - ["Toronto 1", "tor1"]
    - ["Bangalore 1", "blr1"]
    - ["Sydney 1", "syd1"]

droplet_size:
  type: str
  help: "Droplet size (CPU/RAM) — Sandbox requires at least 4 vCPU, 8GB for production"
  default: "s-4vcpu-8gb-amd"
  choices:
    - ["Basic AMD: 4 vCPU, 8GB RAM (~$48/mo)", "s-4vcpu-8gb-amd"]
    - ["Basic AMD: 4 vCPU, 16GB RAM (~$96/mo)", "s-4vcpu-16gb-amd"]
    - ["Basic AMD: 8 vCPU, 16GB RAM (~$96/mo)", "s-8vcpu-16gb-amd"]

# =============================================================================
# Container Images
# =============================================================================
sandbox_image:
  type: str
  help: "AIO Sandbox Docker image (ghcr.io/agent-infra/sandbox)"
  default: "ghcr.io/agent-infra/sandbox:latest"

caddy_image:
  type: str
  help: "Caddy Docker image"
  default: "reg.mini.dev/caddy:2"

# =============================================================================
# Sandbox Configuration
# =============================================================================
sandbox_workspace:
  type: str
  help: "Default workspace path inside the sandbox container"
  default: "/home/gem"

sandbox_timezone:
  type: str
  help: "Timezone for the sandbox container"
  default: "America/New_York"

sandbox_display_width:
  type: int
  help: "VNC display width in pixels"
  default: 1920

sandbox_display_height:
  type: int
  help: "VNC display height in pixels"
  default: 1080

sandbox_homepage:
  type: str
  help: "Browser homepage URL inside the sandbox"
  default: "https://google.com"

enable_jupyter:
  type: bool
  help: "Enable Jupyter Notebook server inside the sandbox"
  default: true

enable_code_server:
  type: bool
  help: "Enable VSCode Server (code-server) inside the sandbox"
  default: true

# =============================================================================
# Infisical Secrets Management (Required)
# =============================================================================
# All application secrets (JWT_PUBLIC_KEY, GITHUB_TOKEN, PROXY_SERVER, etc.)
# live in Infisical. The Machine Identity below is the ONLY credential stored
# in terraform.tfvars — it grants the droplet access to fetch all other
# secrets at runtime via `infisical run`.
infisical_client_id:
  type: str
  help: "Infisical Machine Identity Client ID (from Infisical Dashboard → Machine Identities)"
  default: ""

infisical_client_secret:
  type: str
  help: "Infisical Machine Identity Client Secret (shown once at creation)"
  default: ""

infisical_project_id:
  type: str
  help: "Infisical project ID (the project containing this deployment's secrets)"
  default: ""

infisical_environment:
  type: str
  help: "Infisical environment slug"
  default: "prod"

# =============================================================================
# Skinny Backup Configuration
# =============================================================================
enable_skinny_backups:
  type: bool
  help: "Enable volume-based skinny backups (replaces DO automated backups)"
  default: true

backup_remote_storage:
  type: str
  help: "Remote storage target for backup offloading"
  default: "do-spaces"
  choices:
    - ["DigitalOcean Spaces", "do-spaces"]
    - ["AWS S3", "s3"]
    - ["Local only (no remote)", "none"]
  when: "{{ enable_skinny_backups }}"

backup_do_spaces_bucket:
  type: str
  help: "DO Spaces bucket name for remote backups"
  default: "weown-backups"
  when: "{{ enable_skinny_backups and backup_remote_storage == 'do-spaces' }}"

backup_do_spaces_region:
  type: str
  help: "DO Spaces region slug"
  default: "atl1"
  when: "{{ enable_skinny_backups and backup_remote_storage == 'do-spaces' }}"

# =============================================================================
# Monitoring
# =============================================================================
enable_monitoring:
  type: bool
  help: "Enable DigitalOcean monitoring alerts"
  default: true

alert_email:
  type: str
  help: "Email for monitoring alerts"
  default: "alerts@example.com"
  when: "{{ enable_monitoring }}"

cpu_alert_threshold:
  type: int
  help: "CPU usage alert threshold (%)"
  default: 80
  when: "{{ enable_monitoring }}"

memory_alert_threshold:
  type: int
  help: "Memory usage alert threshold (%)"
  default: 90
  when: "{{ enable_monitoring }}"

disk_alert_threshold:
  type: int
  help: "Disk usage alert threshold (%)"
  default: 85
  when: "{{ enable_monitoring }}"
