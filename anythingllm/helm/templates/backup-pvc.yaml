# Built-in Automatic Backup Storage
# This PVC is ALWAYS created for automatic backups
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "anythingllm.fullname" . }}-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "anythingllm.backupLabels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backup.size }}
  storageClassName: {{ .Values.backup.storageClass | quote }}
