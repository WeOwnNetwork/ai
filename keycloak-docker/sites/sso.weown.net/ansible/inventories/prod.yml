# sso - Production Inventory
# Usage: ansible-playbook site.yml -i inventories/prod.yml

all:
  children:
    keycloak:
      hosts:
        sso:
          ansible_host: 
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/sso_id_ed25519
          app_dir: /opt/sso
          domain: sso.weown.net
          keycloak_image: reg.mini.dev/keycloak:24.0
          caddy_image: reg.mini.dev/caddy:2
          postgres_version: "16"
