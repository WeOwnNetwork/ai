# test-keycloak - Ansible Site Playbook
# Deploys Keycloak SSO stack on a droplet
#
# Usage:
#   ansible-playbook site.yml -i inventories/prod.yml
#   ansible-playbook site.yml -i inventories/prod.yml --tags docker

- name: Deploy test-keycloak Keycloak SSO
  hosts: keycloak
  become: true
  gather_facts: true
  vars_files:
    - vault.yml

  roles:
    - common
    - docker
    - keycloak

  post_tasks:
    - name: Ensure Docker is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Pull latest images
      community.docker.docker_image:
        name: ""
        source: pull
      loop:
        - "reg.mini.dev/keycloak:24.0"
        - "reg.mini.dev/caddy:2"
        - "postgres:16"

    - name: Deploy Keycloak stack
      community.docker.docker_compose_v2:
        project_src: ""
        files:
          - compose.prod.yaml
        pull: always
      register: compose_result

    - name: Restart Keycloak if needed
      when: compose_result.changed
      ansible.builtin.shell: |
        cd  && docker compose up -d
      changed_when: true
