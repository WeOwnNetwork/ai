---
# dev-weown-devbox — Idempotent deployment playbook (Path C app layer)
#
# This playbook owns ALL post-bootstrap state on the shared dev box. Cloud-init
# only handles first-boot bootstrap (base packages, Docker, Infisical CLI, the
# `devs` group, the STABLE sshd hardening drop-in, and bootstrap-secret
# rotation). EVERYTHING that changes over the box's lifetime lives here so
# onboarding/offboarding a developer is just `edit members.yml + re-run`, never
# a `tofu taint` (which would destroy + recreate the droplet and everyone's
# work on it).
#
# What this playbook manages:
#   - Per-member Linux accounts (from ansible/members.yml): users in the `devs`
#     group, each with an EXCLUSIVE authorized_keys (only their own keys open
#     their account), opt-in docker-group membership, and clean removal when
#     state == absent.
#   - The dev toolchain (git, build tools, node, opentofu, doctl, copier,
#     ansible-lint, language servers Zed uses) — idempotent + resilient.
#   - Team-standard Zed settings (files/zed-settings.json) seeded into each
#     member's ~/.config/zed/settings.json (create-if-absent, never clobbered)
#     and /etc/skel, plus the setup-zed helper at /usr/local/bin/setup-zed.
#   - Daily skinny-backup cron of /home + /etc (wraps scripts/backup.sh with
#     Infisical runtime secret injection) + logrotate.
#   - DO droplet tagging: feature tag (skinny-backup) + commit tag (commit-<sha>).
#
# Privilege model (locked):
#   There is NO shared team root. The break-glass admin key (var.ssh_key_fingerprint)
#   is the only root access. Each member's key opens ONLY their own account, and
#   members get NO sudo. docker-group membership is OPT-IN (members.yml docker:true)
#   because the docker group is root-equivalent (a container can bind-mount the
#   host filesystem) — grant it only to members who genuinely need local containers.
#
# Pre-conditions enforced (same as cloud-init's markers):
#   - The droplet has completed cloud-init (.bootstrap-complete exists)
#   - The Infisical Machine Identity auth file exists (.infisical-auth.env)
#   - ansible/members.yml exists (copied from members.example.yml)
#
# Usage:
#   INFISICAL_PROJECT_ID=<id> ansible-playbook -i 'root@<droplet-ip>,' \
#     dev-weown-devbox/ansible/deploy.yml
#
#   Or use the wrapper: scripts/deploy.sh root@<droplet-ip>

- name: Deploy dev-weown-devbox dev box app layer
  hosts: all
  gather_facts: false
  become: true
  vars:
    app_dir: /opt/dev_weown_devbox
    # Login shell for member accounts — rendered by copier from default_shell.
    member_shell: /bin/bash
    infisical_project_id: "{{ lookup('env', 'INFISICAL_PROJECT_ID') }}"
    infisical_env: "{{ lookup('env', 'INFISICAL_ENV') | default('prod', True) }}"
    droplet_name: "dev-weown-devbox"
    git_commit_short: "{{ lookup('pipe', 'git rev-parse --short HEAD 2>/dev/null || echo unknown') }}"
    # Member accounts are only ever placed in this primary group; opt-in docker
    # membership is layered on top (append) in a separate task.
    primary_group: devs

  pre_tasks:
    - name: Require INFISICAL_PROJECT_ID env var
      ansible.builtin.assert:
        that:
          - infisical_project_id | length > 0
        fail_msg: >-
          INFISICAL_PROJECT_ID env var is required. This is the same value
          as terraform.tfvars infisical_project_id. Run:
          INFISICAL_PROJECT_ID=<id> ansible-playbook ...

    - name: Verify droplet has completed cloud-init bootstrap
      ansible.builtin.stat:
        path: "{{ app_dir }}/.bootstrap-complete"
      register: bootstrap_marker

    - name: Fail clearly if bootstrap is not complete
      ansible.builtin.fail:
        msg: >-
          {{ app_dir }}/.bootstrap-complete is missing — droplet
          has not finished cloud-init. Wait a few minutes after `tofu apply`
          and retry. Check /var/log/cloud-init-output.log on the droplet for
          errors.
      when: not bootstrap_marker.stat.exists

    - name: Verify Infisical auth file exists (created by cloud-init)
      ansible.builtin.stat:
        path: "{{ app_dir }}/.infisical-auth.env"
      register: auth_file

    - name: Fail clearly if auth file is missing
      ansible.builtin.fail:
        msg: >-
          {{ app_dir }}/.infisical-auth.env is missing —
          Infisical Machine Identity bootstrap failed. Check
          /var/log/cloud-init-output.log and
          /var/log/dev_weown_devbox-rotation.log.
      when: not auth_file.stat.exists

    # The team roster is NOT a copier prompt — it lives in members.yml so
    # onboarding/offboarding is an edit + re-run. Load it at runtime and fail
    # with a friendly pointer if the operator forgot to create it.
    - name: Check that members.yml exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/members.yml"
      register: members_file
      delegate_to: localhost
      become: false

    - name: Fail clearly if members.yml is missing
      ansible.builtin.fail:
        msg: >-
          {{ playbook_dir }}/members.yml not found. Copy the
          template and fill in the roster:
          `cp ansible/members.example.yml ansible/members.yml`
          (logins = lowercased CCC Short IDs; ssh_keys = each member's PUBLIC keys).
      when: not members_file.stat.exists

    - name: Load team roster from members.yml
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/members.yml"

    - name: Assert the roster is a non-empty list
      ansible.builtin.assert:
        that:
          - members is defined
          - members | length > 0
        fail_msg: >-
          members.yml defines no members. Add at least one entry (see
          members.example.yml for the field reference).

  tasks:
    # ─── Member accounts ─────────────────────────────────────────────────
    # Each member gets their own account in the `devs` group (the SSH gate
    # group from cloud-init's `AllowGroups devs root`). UIDs are pinned in
    # members.yml so file ownership survives a remove + re-add.

    - name: Ensure primary developer group exists
      ansible.builtin.group:
        name: "{{ primary_group }}"
        state: present

    - name: Create / update member accounts (present)
      ansible.builtin.user:
        name: "{{ item.login }}"
        uid: "{{ item.uid }}"
        group: "{{ primary_group }}"
        shell: "{{ member_shell }}"
        comment: "{{ item.full_name | default(item.login) }}"
        create_home: true
        # No sudo, no extra groups here — docker is layered on opt-in below.
        state: present
      loop: "{{ members }}"
      loop_control:
        label: "{{ item.login }}"
      when: (item.state | default('present')) == 'present'

    - name: Install each member's EXCLUSIVE authorized_keys
      # exclusive: true means ONLY the keys listed here open the account —
      # a removed/rotated key stops working on the next deploy. All of a
      # member's keys are joined with newlines so the module manages the
      # whole authorized_keys file as one unit.
      ansible.posix.authorized_key:
        user: "{{ item.login }}"
        key: "{{ item.ssh_keys | join('\n') }}"
        exclusive: true
        state: present
      loop: "{{ members }}"
      loop_control:
        label: "{{ item.login }}"
      when:
        - (item.state | default('present')) == 'present'
        - item.ssh_keys | default([]) | length > 0

    - name: Grant docker-group membership (opt-in; docker:true only)
      # ⚠ The docker group is root-equivalent (a container can bind-mount the
      # host FS), so it weakens per-user isolation. Granted only to members who
      # set `docker: true` in members.yml. append:true so we never strip the
      # member's primary `devs` group.
      ansible.builtin.user:
        name: "{{ item.login }}"
        groups: docker
        append: true
      loop: "{{ members }}"
      loop_control:
        label: "{{ item.login }}"
      when:
        - (item.state | default('present')) == 'present'
        - item.docker | default(false) | bool

    - name: Revoke docker-group membership when docker is false
      # Reconcile the other direction: if a member previously had docker:true
      # and it's now false (or unset), drop them from supplementary groups so
      # any previously-granted docker access is removed. Their primary `devs`
      # group (set on the account above) is unaffected by clearing supplementary
      # groups. Setting groups to empty is always valid, even if no docker group
      # exists, so this is a safe no-op for members who never had docker.
      ansible.builtin.user:
        name: "{{ item.login }}"
        groups: ""
        append: false
      loop: "{{ members }}"
      loop_control:
        label: "{{ item.login }}"
      when:
        - (item.state | default('present')) == 'present'
        - not (item.docker | default(false) | bool)

    # ─── Offboarding (state: absent) ──────────────────────────────────────
    # offboard-user.sh sets state: absent after archiving the member's work.
    # We remove the account AND its home, plus any per-user crontab so no
    # scheduled job lingers under a now-deleted login.

    - name: Remove per-user crontab for offboarded members
      ansible.builtin.command:
        cmd: "crontab -r -u {{ item.login }}"
      loop: "{{ members }}"
      loop_control:
        label: "{{ item.login }}"
      when: (item.state | default('present')) == 'absent'
      register: cron_remove
      changed_when: cron_remove.rc == 0
      # `crontab -r` exits non-zero when there's no crontab and when the user
      # no longer exists — both are fine for an offboard, so never fail here.
      failed_when: false

    - name: Remove offboarded member accounts (absent + delete home)
      ansible.builtin.user:
        name: "{{ item.login }}"
        state: absent
        remove: true
        force: true
      loop: "{{ members }}"
      loop_control:
        label: "{{ item.login }}"
      when: (item.state | default('present')) == 'absent'

    # ─── Dev toolchain ────────────────────────────────────────────────────
    # Idempotent + resilient: a transient failure on one optional component
    # (e.g. a GitHub release fetch) must not block account/Zed reconciliation,
    # so the network-fetch installers guard on `command -v` and re-runs are
    # no-ops.

    - name: Install base dev toolchain (apt)
      ansible.builtin.apt:
        name:
          - git
          - build-essential
          - jq
          - ripgrep
          - fd-find
          - unzip
          - ca-certificates
          - curl
          - python3
          - python3-pip
          - python3-venv
          - pipx
          - yamllint

        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Install Node.js LTS + npm (NodeSource)
      ansible.builtin.shell: |
        set -euo pipefail
        if command -v node >/dev/null 2>&1 && command -v npm >/dev/null 2>&1; then
          echo "node already installed: $(node --version)"
          exit 0
        fi
        curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
        DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
      args:
        executable: /bin/bash
      register: node_install
      changed_when: "'already installed' not in node_install.stdout"

    - name: Install OpenTofu (official installer)
      ansible.builtin.shell: |
        set -euo pipefail
        if command -v tofu >/dev/null 2>&1; then
          echo "tofu already installed: $(tofu version | head -n1)"
          exit 0
        fi
        curl -fsSL https://get.opentofu.org/install-opentofu.sh -o /tmp/install-opentofu.sh
        chmod +x /tmp/install-opentofu.sh
        /tmp/install-opentofu.sh --install-method deb
        rm -f /tmp/install-opentofu.sh
      args:
        executable: /bin/bash
      register: tofu_install
      changed_when: "'already installed' not in tofu_install.stdout"
      failed_when:
        - tofu_install.rc != 0
        - "'already installed' not in tofu_install.stdout"

    - name: Install doctl (GitHub release tarball -> /usr/local/bin)
      ansible.builtin.shell: |
        set -euo pipefail
        if command -v doctl >/dev/null 2>&1; then
          echo "doctl already installed: $(doctl version | head -n1)"
          exit 0
        fi
        DOCTL_VERSION="1.120.0"
        ARCH="$(dpkg --print-architecture)"   # amd64 / arm64
        TARBALL="doctl-${DOCTL_VERSION}-linux-${ARCH}.tar.gz"
        URL="https://github.com/digitalocean/doctl/releases/download/v${DOCTL_VERSION}/${TARBALL}"
        TMP="$(mktemp -d)"
        curl -fsSL "$URL" -o "${TMP}/${TARBALL}"
        tar -xzf "${TMP}/${TARBALL}" -C "$TMP"
        install -m 0755 "${TMP}/doctl" /usr/local/bin/doctl
        rm -rf "$TMP"
      args:
        executable: /bin/bash
      register: doctl_install
      changed_when: "'already installed' not in doctl_install.stdout"
      failed_when:
        - doctl_install.rc != 0
        - "'already installed' not in doctl_install.stdout"

    - name: Install pipx-managed CLIs system-wide (copier, ansible-lint, ruff)
      # PIPX_HOME/PIPX_BIN_DIR make pipx install for all users into /usr/local/bin
      # instead of root's ~/.local/bin (which members can't reach).
      ansible.builtin.shell: |
        set -euo pipefail
        export PIPX_HOME=/opt/pipx
        export PIPX_BIN_DIR=/usr/local/bin
        changed=0
        for pkg in copier ansible-lint ruff; do
          if [ ! -x "/usr/local/bin/${pkg}" ] && ! pipx list --short 2>/dev/null | awk '{print $1}' | grep -qx "$pkg"; then
            pipx install "$pkg"
            changed=1
          fi
        done
        echo "pipx_changed=${changed}"
      args:
        executable: /bin/bash
      register: pipx_install
      changed_when: "'pipx_changed=1' in pipx_install.stdout"

    - name: Install language servers Zed uses (YAML, Python) via npm
      # yaml-language-server (YAML + Ansible) and pyright (Python), installed with
      # `npm -g` directly. We deliberately avoid community.general.npm so the
      # operator workstation needs no extra Ansible collection (deploy.sh only
      # pins community.docker). Node/npm are installed above. ruff (also a Python
      # LSP/formatter Zed can drive) comes from pipx above.
      ansible.builtin.shell: |
        set -euo pipefail
        changed=0
        for pkg in yaml-language-server pyright; do
          if ! npm ls -g --depth=0 "$pkg" >/dev/null 2>&1; then
            npm install -g "$pkg"
            changed=1
          fi
        done
        echo "npm_lsp_changed=$changed"
      args:
        executable: /bin/bash
      register: lsp_install
      changed_when: "'npm_lsp_changed=1' in lsp_install.stdout"
      retries: 3
      delay: 5
      until: lsp_install is succeeded

    # ─── Zed team configuration ───────────────────────────────────────────
    # PRIMARY mode is Zed Remote Development: the member's LOCAL Zed connects
    # over SSH and auto-provisions its own remote server — we do NOT pre-install
    # the Zed binary. We DO ship the team-standard server-side settings.

    - name: Ensure /etc config dir for canonical Zed settings
      ansible.builtin.file:
        path: /etc/dev_weown_devbox
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ship canonical team Zed settings to /etc/dev_weown_devbox
      ansible.builtin.copy:
        src: ../files/zed-settings.json
        dest: /etc/dev_weown_devbox/zed-settings.json
        owner: root
        group: root
        mode: "0644"

    - name: Ensure /etc/skel/.config/zed dir exists
      ansible.builtin.file:
        path: /etc/skel/.config/zed
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Seed team Zed settings into /etc/skel (for future accounts)
      ansible.builtin.copy:
        src: ../files/zed-settings.json
        dest: /etc/skel/.config/zed/settings.json
        owner: root
        group: root
        mode: "0644"

    - name: Ensure each member has a ~/.config/zed dir
      ansible.builtin.file:
        path: "/home/{{ item.login }}/.config/zed"
        state: directory
        owner: "{{ item.login }}"
        group: "{{ primary_group }}"
        mode: "0755"
      loop: "{{ members }}"
      loop_control:
        label: "{{ item.login }}"
      when: (item.state | default('present')) == 'present'

    - name: Seed team Zed settings into each member's home (create-if-absent)
      # force: false => we NEVER clobber a member's own customised settings;
      # this only writes the team defaults the first time (or after they delete
      # the file). Ownership is the member so they can edit it freely.
      ansible.builtin.copy:
        src: ../files/zed-settings.json
        dest: "/home/{{ item.login }}/.config/zed/settings.json"
        owner: "{{ item.login }}"
        group: "{{ primary_group }}"
        mode: "0644"
        force: false
      loop: "{{ members }}"
      loop_control:
        label: "{{ item.login }}"
      when: (item.state | default('present')) == 'present'

    - name: Install the setup-zed helper to /usr/local/bin/setup-zed
      ansible.builtin.copy:
        src: ../scripts/setup-zed.sh
        dest: /usr/local/bin/setup-zed
        owner: root
        group: root
        mode: "0755"

    # ─── Skinny backups (/home + /etc) ────────────────────────────────────
    # Mirrors the anythingllm cron+logrotate pattern: upload backup.sh, then a
    # daily cron.daily wrapper that sources the Machine Identity auth file,
    # logs in (universal-auth), and runs backup.sh inside `infisical run` so the
    # DO Spaces upload creds (SPACES_ACCESS_KEY / SPACES_SECRET_KEY) are in env.

    - name: Upload skinny-backup script
      ansible.builtin.copy:
        src: ../scripts/backup.sh
        dest: "{{ app_dir }}/backup.sh"
        owner: root
        group: root
        mode: "0750"

    - name: Upload restore script
      # restore.sh remote mode execs the DROPLET's own copy
      # (/opt/<slug>/restore.sh) inside `infisical run`, so it must live on the
      # box alongside backup.sh — otherwise remote restores fail.
      ansible.builtin.copy:
        src: ../scripts/restore.sh
        dest: "{{ app_dir }}/restore.sh"
        owner: root
        group: root
        mode: "0750"

    - name: Install daily backup cron (wraps backup.sh with Infisical injection)
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          # Daily skinny backup with Infisical runtime secret injection. Managed
          # by dev-weown-devbox/ansible/deploy.yml — edit there, not here.
          set -euo pipefail
          # shellcheck disable=SC1091
          source {{ app_dir }}/.infisical-auth.env
          infisical login --method=universal-auth \
            --clientId="$INFISICAL_CLIENT_ID" \
            --clientSecret="$INFISICAL_CLIENT_SECRET" \
            --silent
          infisical run \
            --projectId={{ infisical_project_id }} \
            --env={{ infisical_env }} \
            -- {{ app_dir }}/backup.sh \
            >> /var/log/dev_weown_devbox-backup.log 2>&1
        dest: /etc/cron.daily/dev_weown_devbox-backup
        owner: root
        group: root
        mode: "0750"

    - name: Ensure logrotate config for backup log
      ansible.builtin.copy:
        content: |
          # Managed by dev-weown-devbox/ansible/deploy.yml — do not edit on host.
          /var/log/dev_weown_devbox-backup.log {
            weekly
            rotate 12
            compress
            missingok
            notifempty
            create 0640 root root
          }
        dest: /etc/logrotate.d/dev_weown_devbox-backup
        owner: root
        group: root
        mode: "0644"


    # ─── DO droplet tagging ──────────────────────────────────────────────
    # After a successful deploy, update droplet tags to reflect actual state:
    # - skinny-backup tag (we just configured the cron, when enabled)
    # - commit-<sha> tag (which git commit produced this deployment)
    # See docs/INFRA_BOOTSTRAP_PATTERN.md "DO tag taxonomy" for the full scheme.
    # Tags are mutated via the shared scripts/tag-droplet.sh helper; ansible
    # runs it locally via delegate_to.

    - name: Update DO droplet tags (commit-<sha> + skinny-backup)
      ansible.builtin.shell: |
        set -euo pipefail
        scripts/tag-droplet.sh "{{ droplet_name }}" \
          replace-prefix commit- "commit-{{ git_commit_short }}" \
          add skinny-backup
      args:
        executable: /bin/bash
        # Walk up to the WeOwn repo root so `scripts/tag-droplet.sh` resolves.
        # Layout: <repo-root>/devbox-docker/sites/<name>/ansible/deploy.yml
        #   playbook_dir         = …/devbox-docker/sites/<name>/ansible
        #   dirname × 4          = <repo-root>
        chdir: "{{ playbook_dir | dirname | dirname | dirname | dirname }}"
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false   # Tagging failure must not block the deploy

    - name: Report success
      ansible.builtin.debug:
        msg: >-
          dev-weown-devbox dev box app layer deployed (commit
          {{ git_commit_short }}).
          Roster entries processed: {{ members | length }}.
          SSH endpoint: dev.weown.tools (each member uses their own account + key).
          Each member runs `setup-zed` once to add their OpenRouter key.
