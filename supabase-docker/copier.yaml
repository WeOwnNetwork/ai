# supabase-docker copier template
# Template for creating self-hosted Supabase deployments on DigitalOcean droplets
# Supabase stack: Postgres 15 + PostgREST + GoTrue (Auth) + Realtime + Studio + pgvector
# All application secrets are sourced from Infisical at runtime — never stored in git or on disk
# Usage: copier copy . ../supabase-instance --data-file answers.yaml
#
# See: https://copier.readthedocs.io/

_min_copier_version: "9.0.0"
_subdirectory: template

# =============================================================================
# Project Identity
# =============================================================================
project_name:
  type: str
  help: "Project name (lowercase, hyphens allowed - e.g., 'supabase-pop')"
  validator: "{% if not project_name | regex_search('^[a-z][a-z0-9-]*$') %}Must be lowercase alphanumeric with hyphens{% endif %}"

domain:
  type: str
  help: "Primary domain (e.g., 'supabase.weown.dev')"
  validator: "{% if not domain | regex_search('^[a-z0-9][a-z0-9.-]+\\.[a-z]{2,}$') %}Must be a valid domain{% endif %}"

# =============================================================================
# DigitalOcean Infrastructure
# =============================================================================
do_region:
  type: str
  help: "DigitalOcean region slug"
  default: "atl1"
  choices:
    - ["Atlanta 1", "atl1"]
    - ["New York 1", "nyc1"]
    - ["New York 3", "nyc3"]
    - ["San Francisco 3", "sfo3"]
    - ["Amsterdam 3", "ams3"]
    - ["Singapore 1", "sgp1"]
    - ["London 1", "lon1"]
    - ["Frankfurt 1", "fra1"]
    - ["Toronto 1", "tor1"]
    - ["Bangalore 1", "blr1"]
    - ["Sydney 1", "syd1"]

droplet_size:
  type: str
  help: "Droplet size (CPU/RAM) — Supabase stack needs 8GB minimum for prod"
  default: "s-4vcpu-8gb-amd"
  choices:
    - ["Basic AMD: 2 vCPU, 4GB RAM (~$24/mo) — dev/test only", "s-2vcpu-4gb-amd"]
    - ["Basic AMD: 4 vCPU, 8GB RAM (~$48/mo) — minimum prod", "s-4vcpu-8gb-amd"]
    - ["Basic AMD: 4 vCPU, 16GB RAM (~$96/mo) — recommended prod", "s-4vcpu-16gb-amd"]
    - ["Basic AMD: 8 vCPU, 16GB RAM (~$144/mo) — high traffic", "s-8vcpu-16gb-amd"]

# =============================================================================
# Container Images
# =============================================================================
postgres_image:
  type: str
  help: "Supabase Postgres image (includes pgvector + extensions)"
  default: "supabase/postgres:15.6.1.115"

postgrest_image:
  type: str
  help: "PostgREST image (auto-generates REST API from Postgres schema)"
  default: "postgrest/postgrest:v12.2.0"

gotrue_image:
  type: str
  help: "GoTrue auth image (JWT-based auth service)"
  default: "supabase/gotrue:v2.158.1"

realtime_image:
  type: str
  help: "Realtime image (WebSocket subscriptions to Postgres changes)"
  default: "supabase/realtime:v2.30.34"

studio_image:
  type: str
  help: "Supabase Studio admin UI image"
  default: "supabase/studio:20240805-1abf2d5"

caddy_image:
  type: str
  help: "Caddy Docker image (TLS reverse proxy)"
  default: "reg.mini.dev/caddy:2"

postgres_version:
  type: str
  help: "PostgreSQL major version (informational — actual version pinned by postgres_image)"
  default: "15"

# =============================================================================
# Supabase Feature Toggles
# =============================================================================
enable_pgvector:
  type: bool
  help: "Enable pgvector extension (vector embeddings for AI/RAG workloads)"
  default: true

enable_studio:
  type: bool
  help: "Enable Supabase Studio admin UI"
  default: true

enable_realtime:
  type: bool
  help: "Enable Realtime service (WebSocket subscriptions)"
  default: true

# =============================================================================
# Infisical Secrets Management (Required)
# =============================================================================
# All application secrets (POSTGRES_PASSWORD, JWT_SECRET, ANON_KEY, SERVICE_ROLE_KEY,
# DASHBOARD_USERNAME, DASHBOARD_PASSWORD, MINIMUS_TOKEN, SPACES_ACCESS_KEY, etc.)
# live in Infisical. The Machine Identity below is the ONLY credential stored in
# terraform.tfvars — it grants the droplet access to fetch all other secrets at
# runtime via `infisical run`.
infisical_client_id:
  type: str
  help: "Infisical Machine Identity Client ID (from Infisical Dashboard → Machine Identities)"
  default: ""

infisical_client_secret:
  type: str
  help: "Infisical Machine Identity Client Secret (shown once at creation)"
  default: ""

infisical_project_id:
  type: str
  help: "Infisical project ID (the project containing this deployment's secrets)"
  default: ""

infisical_environment:
  type: str
  help: "Infisical environment slug"
  default: "prod"

# =============================================================================
# Skinny Backup Configuration
# =============================================================================
enable_skinny_backups:
  type: bool
  help: "Enable volume-based skinny backups (replaces DO automated backups)"
  default: true

backup_remote_storage:
  type: str
  help: "Remote storage target for backup offloading"
  default: "do-spaces"
  choices:
    - ["DigitalOcean Spaces", "do-spaces"]
    - ["AWS S3", "s3"]
    - ["Local only (no remote)", "none"]
  when: "{{ enable_skinny_backups }}"

backup_do_spaces_bucket:
  type: str
  help: "DO Spaces bucket name for remote backups"
  default: "weown-prod-backups"
  when: "{{ enable_skinny_backups and backup_remote_storage == 'do-spaces' }}"

backup_do_spaces_region:
  type: str
  help: "DO Spaces region slug"
  default: "atl1"
  when: "{{ enable_skinny_backups and backup_remote_storage == 'do-spaces' }}"

# =============================================================================
# Monitoring
# =============================================================================
enable_monitoring:
  type: bool
  help: "Enable DigitalOcean monitoring alerts"
  default: true

alert_email:
  type: str
  help: "Email for monitoring alerts"
  default: "alerts@example.com"
  when: "{{ enable_monitoring }}"

cpu_alert_threshold:
  type: int
  help: "CPU usage alert threshold (%)"
  default: 80
  when: "{{ enable_monitoring }}"

memory_alert_threshold:
  type: int
  help: "Memory usage alert threshold (%)"
  default: 90
  when: "{{ enable_monitoring }}"

disk_alert_threshold:
  type: int
  help: "Disk usage alert threshold (%)"
  default: 85
  when: "{{ enable_monitoring }}"
