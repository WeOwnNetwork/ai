# wordpress-docker copier template
# Template for creating new WordPress sites on DigitalOcean droplets
# Usage: copier copy . ../sites/my-new-site --data-file answers.yaml
#
# See: https://copier.readthedocs.io/

_min_copier_version: "9.0.0"
_subdirectory: template

# =============================================================================
# Site Identity
# =============================================================================
project_name:
  type: str
  help: "Project name (lowercase, hyphens allowed - e.g., 'burnedout-xyz')"
  validator: "{% if not project_name | regex_search('^[a-z][a-z0-9-]*$') %}Must be lowercase alphanumeric with hyphens{% endif %}"

domain:
  type: str
  help: "Primary domain (e.g., 'burnedout.xyz' or 'ptoken.agency')"
  validator: "{% if not domain | regex_search('^[a-z0-9][a-z0-9.-]+\\.[a-z]{2,}$') %}Must be a valid domain{% endif %}"

domain_style:
  type: str
  help: "Domain style for WordPress URLs and Caddy config"
  choices:
    "apex": "Root domain only (https://example.com)"
    "www": "WWW subdomain with apex redirect (https://www.example.com)"
  default: "apex"

# =============================================================================
# DigitalOcean Infrastructure
# =============================================================================
do_region:
  type: str
  help: "DigitalOcean region slug"
  default: "nyc3"
  choices:
    - ["New York 1", "nyc1"]
    - ["New York 3", "nyc3"]
    - ["San Francisco 3", "sfo3"]
    - ["Amsterdam 3", "ams3"]
    - ["Singapore 1", "sgp1"]
    - ["London 1", "lon1"]
    - ["Frankfurt 1", "fra1"]
    - ["Toronto 1", "tor1"]
    - ["Bangalore 1", "blr1"]
    - ["Sydney 1", "syd1"]

droplet_size:
  type: str
  help: "Droplet size (CPU/RAM)"
  default: "s-2vcpu-2gb-amd"
  choices:
    "s-1vcpu-1gb": "Basic: 1 vCPU, 1GB RAM (~$6/mo)"
    "s-1vcpu-2gb": "Basic: 1 vCPU, 2GB RAM (~$12/mo)"
    "s-2vcpu-2gb-amd": "Basic AMD: 2 vCPU, 2GB RAM (~$18/mo)"
    "s-2vcpu-4gb-amd": "Basic AMD: 2 vCPU, 4GB RAM (~$24/mo)"
    "s-4vcpu-8gb-amd": "Basic AMD: 4 vCPU, 8GB RAM (~$48/mo)"

ssh_source_cidrs:
  type: json
  help: "List of CIDRs allowed to SSH (port 22). PRODUCTION: restrict to your admin IP/32 or VPN range. The default is wide-open for first-boot only."
  default: '["0.0.0.0/0", "::/0"]'

# =============================================================================
# Container Images
# =============================================================================
wp_image:
  type: str
  help: "WordPress Docker image (Minimus registry or Docker Hub)"
  default: "reg.mini.dev/1923/wordpress-fluentsmtp:latest"

caddy_image:
  type: str
  help: "Caddy Docker image"
  default: "reg.mini.dev/caddy:2"

mariadb_version:
  type: str
  help: "MariaDB version"
  default: "11"

# =============================================================================
# Security & Features
# =============================================================================
enable_wordfence_waf:
  type: bool
  help: "Enable Wordfence WAF auto-configuration (.user.ini)"
  default: true

# =============================================================================
# Core Plugin Bundle (shared premium plugins from DO Spaces)
# =============================================================================
enable_core_plugin_bundle:
  type: bool
  help: "Download and install the shared core WordPress plugin bundle (FluentCRM, FluentCart, Wordfence, etc.) from DO Spaces during deploy"
  default: true

core_plugin_bundle_infisical_project_id:
  type: str
  help: "Infisical project ID holding the Spaces credentials for the shared plugin bundle (separate from this site's own infisical_project_id)"
  default: ""
  when: "{{ enable_core_plugin_bundle }}"

core_plugin_bundle_path:
  type: str
  help: "Path within the Spaces bucket to the plugin bundle tarball"
  default: "wordpress-plugins/core-plugins.tar.gz"
  when: "{{ enable_core_plugin_bundle }}"

# =============================================================================
# PHP Configuration
# =============================================================================
php_upload_max_filesize:
  type: str
  help: "PHP upload_max_filesize (e.g. 256M, 512M, 1G)"
  default: "256M"

php_post_max_size:
  type: str
  help: "PHP post_max_size — should be >= php_upload_max_filesize"
  default: "256M"

php_memory_limit:
  type: str
  help: "PHP memory_limit for WordPress"
  default: "256M"

php_max_execution_time:
  type: str
  help: "PHP max_execution_time in seconds (WordPress migration needs 300+)"
  default: "300"

infisical_project_id:
  type: str
  help: "Infisical project ID (from Infisical Dashboard → Project Settings)"
  default: ""

infisical_environment:
  type: str
  help: "Infisical environment slug"
  default: "prod"

infisical_client_id:
  type: str
  help: "Infisical Machine Identity Client ID (Dashboard → Machine Identities → Universal Auth)"
  default: ""

infisical_client_secret:
  type: str
  help: "Infisical Machine Identity Client Secret (shown once at creation — store securely)"
  secret: true
  default: ""

# =============================================================================
# Backup Configuration
# =============================================================================
enable_skinny_backups:
  type: bool
  help: "Enable volume-based skinny backups (replaces DO automated backups)"
  default: true

backup_remote_storage:
  type: str
  help: "Remote storage for backup offloading"
  default: "none"
  choices:
    - ["Local only (no remote storage)", "none"]
    - ["DigitalOcean Spaces", "do-spaces"]
    - ["AWS S3", "s3"]
  when: "{{ enable_skinny_backups }}"

backup_do_spaces_bucket:
  type: str
  help: "DO Spaces bucket name for remote backups"
  default: "weown-backups"
  when: "{{ enable_skinny_backups and backup_remote_storage == 'do-spaces' }}"

backup_do_spaces_region:
  type: str
  help: "DO Spaces region slug"
  default: "nyc3"
  when: "{{ enable_skinny_backups and backup_remote_storage == 'do-spaces' }}"

# =============================================================================
# Monitoring
# =============================================================================
enable_monitoring:
  type: bool
  help: "Enable DigitalOcean monitoring alerts"
  default: true

alert_email:
  type: str
  help: "Email for monitoring alerts"
  default: "alerts@example.com"
  when: "{{ enable_monitoring }}"

cpu_alert_threshold:
  type: int
  help: "CPU usage alert threshold (%)"
  default: 80
  when: "{{ enable_monitoring }}"

memory_alert_threshold:
  type: int
  help: "Memory usage alert threshold (%)"
  default: 90
  when: "{{ enable_monitoring }}"

disk_alert_threshold:
  type: int
  help: "Disk usage alert threshold (%)"
  default: 85
  when: "{{ enable_monitoring }}"
