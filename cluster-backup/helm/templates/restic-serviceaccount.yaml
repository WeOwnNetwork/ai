{{- if and .Values.velero.enabled .Values.velero.restic.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cluster-backup.resticServiceAccountName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "cluster-backup.labels" . | nindent 4 }}
    app.kubernetes.io/component: restic
  {{- if and (hasKey .Values.velero.restic "serviceAccount") .Values.velero.restic.serviceAccount.annotations }}
  annotations:
    {{- toYaml .Values.velero.restic.serviceAccount.annotations | nindent 4 }}
  {{- end }}
# Restic / node-agent calls the Kubernetes API to manage podvolumebackups,
# podvolumerestores, resticrepositories, and coordination leases. Token
# automount is required; disabling it would break those controllers.
automountServiceAccountToken: true
{{- end }}
