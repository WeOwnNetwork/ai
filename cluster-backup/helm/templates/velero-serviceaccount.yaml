{{- if .Values.velero.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cluster-backup.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "cluster-backup.labels" . | nindent 4 }}
    app.kubernetes.io/component: velero-server
  {{- if and (hasKey .Values.velero.server "serviceAccount") .Values.velero.server.serviceAccount.annotations }}
  annotations:
    {{- toYaml .Values.velero.server.serviceAccount.annotations | nindent 4 }}
  {{- end }}
# Velero MUST be able to authenticate to the Kubernetes API (backup/restore
# CRDs, cross-namespace resource enumeration, ClusterRole-scoped reads/writes).
# Disabling token automount would only be safe if the deployment explicitly
# mounted a projected serviceAccountToken volume — which it does not.
automountServiceAccountToken: true
{{- end }}
