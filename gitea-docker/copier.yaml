# gitea-docker copier template
# Template for creating Gitea (self-hosted git) deployments on DigitalOcean droplets
# Gitea authenticates via Keycloak (OIDC) — see README for the auth-source bootstrap
# All application secrets are sourced from Infisical at runtime — never stored in git or on disk
# Usage: copier copy . ../gitea-git --data-file answers.yaml
#
# See: https://copier.readthedocs.io/

_min_copier_version: "9.0.0"
_subdirectory: template

# =============================================================================
# Project Identity
# =============================================================================
project_name:
  type: str
  help: "Project name (lowercase, hyphens allowed - e.g., 'gitea-git')"
  validator: "{% if not project_name | regex_search('^[a-z][a-z0-9-]*$') %}Must be lowercase alphanumeric with hyphens{% endif %}"

domain:
  type: str
  help: "Primary domain (e.g., 'git.weown.id')"
  validator: "{% if not domain | regex_search('^[a-z0-9][a-z0-9.-]+\\.[a-z]{2,}$') %}Must be a valid domain{% endif %}"

# =============================================================================
# DigitalOcean Infrastructure
# =============================================================================
do_region:
  type: str
  help: "DigitalOcean region slug"
  default: "atl1"
  choices:
    - ["Atlanta 1", "atl1"]
    - ["New York 1", "nyc1"]
    - ["New York 3", "nyc3"]
    - ["San Francisco 3", "sfo3"]
    - ["Amsterdam 3", "ams3"]
    - ["Singapore 1", "sgp1"]
    - ["London 1", "lon1"]
    - ["Frankfurt 1", "fra1"]
    - ["Toronto 1", "tor1"]
    - ["Bangalore 1", "blr1"]
    - ["Sydney 1", "syd1"]

droplet_size:
  type: str
  help: "Droplet size (CPU/RAM)"
  default: "s-2vcpu-4gb-amd"
  choices:
    - ["Basic: 1 vCPU, 2GB RAM (~$12/mo)", "s-1vcpu-2gb"]
    - ["Basic AMD: 2 vCPU, 4GB RAM (~$24/mo)", "s-2vcpu-4gb-amd"]
    - ["Basic AMD: 4 vCPU, 8GB RAM (~$48/mo)", "s-4vcpu-8gb-amd"]
    - ["Basic AMD: 4 vCPU, 16GB RAM (~$96/mo)", "s-4vcpu-16gb-amd"]

# =============================================================================
# Network Security
# =============================================================================
ssh_source_cidrs:
  type: json
  help: "List of CIDRs allowed to SSH (port 22). PRODUCTION: restrict to your admin IP/32 or VPN range. The default is wide-open for first-boot only."
  default: '["0.0.0.0/0", "::/0"]'

# =============================================================================
# Container Images
# =============================================================================
gitea_image:
  type: str
  help: "Gitea Docker image (use reg.mini.dev/gitea:<tag> in prod when available)"
  default: "gitea/gitea:1.24"

caddy_image:
  type: str
  help: "Caddy Docker image"
  default: "reg.mini.dev/caddy:2"

postgres_version:
  type: str
  help: "PostgreSQL version"
  default: "16"

gitea_db_name:
  type: str
  help: "PostgreSQL database name for Gitea"
  default: "gitea"

gitea_ssh_port:
  type: int
  help: "Host port published for Gitea SSH (git clone over SSH); 22 is taken by sshd"
  default: 2222

# =============================================================================
# Keycloak SSO (OIDC)
# =============================================================================
keycloak_realm_url:
  type: str
  help: "Keycloak realm base URL for OIDC (e.g., 'https://sso.weown.id/realms/weown')"
  default: "https://sso.weown.id/realms/weown"

# =============================================================================
# Infisical Secrets Management (Required)
# =============================================================================
# All application secrets (POSTGRES_PASSWORD, GITEA__database__PASSWD, GITEA__security__SECRET_KEY,
# MINIMUS_TOKEN, SPACES_ACCESS_KEY, etc.) live in Infisical. The Machine Identity
# below is the ONLY credential stored in terraform.tfvars — it grants the droplet
# access to fetch all other secrets at runtime via `infisical run`.
infisical_client_id:
  type: str
  help: "Infisical Machine Identity Client ID (from Infisical Dashboard → Machine Identities)"
  default: ""

infisical_client_secret:
  type: str
  help: "Infisical Machine Identity Client Secret (shown once at creation)"
  default: ""

infisical_project_id:
  type: str
  help: "Infisical project ID (the project containing this deployment's secrets)"
  default: ""

infisical_environment:
  type: str
  help: "Infisical environment slug"
  default: "prod"

# =============================================================================
# Skinny Backup Configuration
# =============================================================================
enable_skinny_backups:
  type: bool
  help: "Enable volume-based skinny backups (replaces DO automated backups)"
  default: true

backup_remote_storage:
  type: str
  help: "Remote storage target for backup offloading"
  default: "do-spaces"
  choices:
    - ["DigitalOcean Spaces", "do-spaces"]
    - ["AWS S3", "s3"]
    - ["Local only (no remote)", "none"]
  when: "{{ enable_skinny_backups }}"

backup_do_spaces_bucket:
  type: str
  help: "DO Spaces bucket name for remote backups"
  default: "weown-backups"
  when: "{{ enable_skinny_backups and backup_remote_storage == 'do-spaces' }}"

backup_do_spaces_region:
  type: str
  help: "DO Spaces region slug"
  default: "atl1"
  when: "{{ enable_skinny_backups and backup_remote_storage == 'do-spaces' }}"

# =============================================================================
# Monitoring
# =============================================================================
enable_monitoring:
  type: bool
  help: "Enable DigitalOcean monitoring alerts"
  default: true

alert_email:
  type: str
  help: "Email for monitoring alerts"
  default: "alerts@example.com"
  when: "{{ enable_monitoring }}"

cpu_alert_threshold:
  type: int
  help: "CPU usage alert threshold (%)"
  default: 80
  when: "{{ enable_monitoring }}"

memory_alert_threshold:
  type: int
  help: "Memory usage alert threshold (%)"
  default: 90
  when: "{{ enable_monitoring }}"

disk_alert_threshold:
  type: int
  help: "Disk usage alert threshold (%)"
  default: 85
  when: "{{ enable_monitoring }}"
