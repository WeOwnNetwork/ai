wordpress:
  domain: "burnedout.xyz"
  wordpressBlogName: "BurnedOut"
  includeWWW: true
  redirectToWWW: true

ingress:
  enabled: true
  className: "nginx"
  # Only secretName is consumed from this list; hosts are built from
  # wordpress.domain + includeWWW in the ingress template.
  tls:
    - secretName: burnedout-tls
